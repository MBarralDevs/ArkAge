name: normalize-goldsky

# External scheduler for the Goldsky → app normalizer.
#
# Vercel's Hobby plan caps cron frequency at once-per-day, which is too
# slow for the canonical-contract event normalizer (it feeds the jobs
# feed + workflow resumeHook calls). Instead of a Vercel cron, this
# workflow pings the CRON_SECRET-protected route on a tight interval.
#
# Note: GitHub Actions schedule granularity is 5 min minimum and is
# best-effort — runs can be delayed under load. If tighter / more
# reliable cadence is needed, point cron-job.org at the same URL, or
# upgrade Vercel to Pro and move the entry back into vercel.ts.
#
# Required repo secret: CRON_SECRET (Settings → Secrets and variables →
# Actions) — must match the CRON_SECRET env var in the Vercel project.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger normalize-goldsky
        run: |
          curl -fsS --max-time 70 \
            -X GET "https://arkage-zeta.vercel.app/api/cron/normalize-goldsky" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
